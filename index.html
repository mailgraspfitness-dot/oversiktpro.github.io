<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OversiktPro — Bruktbilintelligens for FINN.no</title>
  <meta name="description" content="OversiktPro er en Chrome-utvidelse for FINN.no som viser live verdivurdering, deal score, sikkerhet, markedssporing og deal discovery direkte på bruktbilannonser." />
  <meta name="theme-color" content="#f7fbff" />
  <style>
    :root {
      --bg: #f7fbff;
      --bg-2: #ffffff;
      --line: #dbe4ee;
      --line-soft: #e8eff6;
      --text: #0f172a;
      --muted: #5f6f86;
      --muted-2: #8a99ad;
      --sky: #0ea5e9;
      --sky-2: #38bdf8;
      --sky-soft: #eef8ff;
      --navy: #0b1220;
      --good: #059669;
      --good-bg: #ecfdf5;
      --bad: #e11d48;
      --bad-bg: #fff1f2;
      --warn: #d97706;
      --warn-bg: #fff7ed;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 30px 90px rgba(14, 30, 58, 0.16);
      --radius: 28px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.35), transparent 28%),
        radial-gradient(circle at 80% 8%, rgba(59, 130, 246, 0.10), transparent 22%),
        linear-gradient(180deg, #f7fbff 0%, #f8fafc 25%, #ffffff 100%);
    }

    a { color: inherit; text-decoration: none; }
    .container { width: min(calc(100% - 40px), var(--max)); margin: 0 auto; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.7);
    }

    .site-header .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 0;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #e0f2fe, #dbeafe 55%, #ffffff);
      box-shadow: 0 6px 20px rgba(15,23,42,0.08);
      border: 1px solid #dbeafe;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand-title { font-size: 22px; font-weight: 900; font-style: italic; letter-spacing: -0.03em; }
    .brand-sub { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }

    nav { display: flex; align-items: center; gap: 28px; color: var(--muted); font-size: 14px; font-weight: 600; }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: 0.2s ease;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: white; box-shadow: 0 16px 35px rgba(15,23,42,0.18); }
    .btn-secondary { background: rgba(255,255,255,0.85); color: var(--muted); border-color: #d1d9e2; }
    .btn-link { color: var(--muted); background: transparent; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      border: 1px solid #dbeafe;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      box-shadow: 0 10px 25px rgba(15,23,42,0.05);
    }

    .hero { padding: 58px 0 90px; }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.12fr);
      gap: 70px;
      align-items: start;
    }

    .hero-copy {
      padding-top: 36px;
      position: relative;
      z-index: 2;
    }

    .hero-visual {
      margin-top: 6px;
      transform: translateY(34px) scale(1.03);
      transform-origin: top center;
    }

    h1 {
      margin: 18px 0 0;
      font-size: clamp(44px, 7vw, 76px);
      line-height: 0.96;
      letter-spacing: -0.055em;
      font-weight: 700;
      max-width: 760px;
    }

    .lead {
      margin: 22px 0 0;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.7;
      color: var(--muted);
      max-width: 760px;
    }

    .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 30px; }

    .mini-trust {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 26px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .mini-trust span { display: inline-flex; align-items: center; gap: 8px; }
    .dot-good, .dot-sky {
      width: 10px; height: 10px; border-radius: 999px; display: inline-block;
    }
    .dot-good { background: var(--good); }
    .dot-sky { background: var(--sky); }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 30px;
    }

    .stat-pill {
      border-radius: 22px;
      padding: 16px;
      background: rgba(255,255,255,0.86);
      border: 1px solid #dbe4ee;
      box-shadow: 0 12px 28px rgba(15,23,42,0.04);
      backdrop-filter: blur(10px);
    }
    .stat-pill .label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted-2); }
    .stat-pill .value { margin-top: 6px; font-size: 18px; font-weight: 700; color: var(--text); }

    .listing-shell {
      border-radius: 36px;
      padding: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      min-height: 740px;
    }

    .listing-shell::before {
      content: "";
      position: absolute;
      inset: -80px -40px auto auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(125,211,252,0.55), transparent 60%);
      filter: blur(18px);
      pointer-events: none;
    }

    .listing-inner {
      border-radius: 30px;
      padding: 18px;
      background: rgba(248,250,252,0.82);
      border: 1px solid var(--line-soft);
      position: relative;
      z-index: 1;
      min-height: 708px;
    }

    .listing-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 22px;
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(15,23,42,0.04);
    }

    .listing-topbar .left { display: flex; align-items: center; gap: 12px; }
    .listing-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #f1f5f9;
      display: grid;
      place-items: center;
      font-size: 16px;
    }
    .listing-title { font-size: 14px; font-weight: 700; }
    .listing-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .listing-live {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .listing-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(360px, 0.82fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
      min-height: 620px;
    }

    .image-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 16px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .image-stage {
      flex: 1;
      min-height: 560px;
      border-radius: 22px;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc 38%, #dbeafe);
      padding: 18px;
      display: flex;
    }

    .image-stage-inner {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.8);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.48)),
        radial-gradient(circle at top right, rgba(125,211,252,0.4), transparent 30%);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .image-caption { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .image-specs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
      max-width: 260px;
    }
    .image-chip {
      padding: 11px 12px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-radius: 14px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 6px 16px rgba(15,23,42,0.04);
    }
    .listing-placeholder {
      flex: 1;
      margin-top: 18px;
      border-radius: 22px;
      border: 1px dashed #d6e4f1;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.16));
      position: relative;
      overflow: hidden;
    }
    .listing-placeholder::before {
      content: "";
      position: absolute;
      inset: 22px 22px auto 22px;
      height: 68px;
      border-radius: 16px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.7);
    }
    .listing-placeholder::after {
      content: "";
      position: absolute;
      inset: 120px 22px 22px 22px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.48);
    }

    .mock-extension-wrap {
      position: relative;
      align-self: stretch;
      display: flex;
      align-items: stretch;
    }
    .mock-extension-wrap::before {
      content: "";
      position: absolute;
      inset: -28px;
      border-radius: 40px;
      background: radial-gradient(circle at top, rgba(125,211,252,0.44), transparent 55%);
      filter: blur(20px);
      z-index: 0;
    }

    .mock-extension {
      position: relative;
      z-index: 1;
      border-radius: 30px;
      padding: 12px;
      background: linear-gradient(135deg, #eef8ff, #ffffff 48%, #eff6ff);
      border: 1px solid #cfe9fb;
      box-shadow: var(--shadow-lg);
      width: 100%;
      min-height: 600px;
      display: flex;
    }

    .mock-extension-card {
      border-radius: 24px;
      background: rgba(255,255,255,0.93);
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: 0 18px 60px rgba(30,41,59,0.10);
      overflow: hidden;
      backdrop-filter: blur(10px);
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .mock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .mock-brand { font-size: 24px; font-weight: 900; font-style: italic; letter-spacing: -0.03em; }
    .mock-brand-sub { margin-top: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }
    .mock-tag {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #0369a1;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
    }

    .mock-body { padding: 18px 20px 20px; display: flex; flex-direction: column; flex: 1; }
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mini-box {
      border-radius: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(248,250,252,0.75);
    }
    .mini-box.good { border-color: #bbf7d0; background: #ecfdf5; }
    .mini-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted-2); }
    .mini-box.good .mini-label { color: var(--good); }
    .mini-value { margin-top: 6px; font-size: 27px; line-height: 1.1; font-weight: 700; letter-spacing: -0.03em; }
    .mini-box.good .mini-value { color: var(--good); }

    .analysis-card {
      margin-top: 14px;
      border-radius: 22px;
      padding: 16px;
      border: 1px solid var(--line);
      background: white;
      box-shadow: 0 10px 24px rgba(15,23,42,0.04);
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .deal-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    .section-mini-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }
    .deal-status { margin-top: 6px; font-size: 32px; line-height: 1.05; font-weight: 700; letter-spacing: -0.04em; color: var(--good); }
    .deal-pill {
      white-space: nowrap;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--good);
      background: var(--good-bg);
      border: 1px solid #bbf7d0;
    }

    .tooltip-row {
      padding: 12px 0 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .tooltip {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }
    .tooltip-badge {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #475569;
      display: inline-grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }
    .tooltip-content {
      display: none;
      position: absolute;
      left: 0;
      top: 24px;
      width: 280px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: white;
      box-shadow: 0 20px 45px rgba(15,23,42,0.12);
      color: var(--muted);
      line-height: 1.6;
      z-index: 10;
    }
    .tooltip:hover .tooltip-content { display: block; }

    .market-box {
      border-radius: 18px;
      border: 1px solid #dbeafe;
      background: #f0f9ff;
      padding: 14px;
    }
    .market-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .confidence-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #bae6fd;
      background: white;
      font-size: 12px;
      font-weight: 700;
      color: #0369a1;
      white-space: nowrap;
    }

    .insight-list { margin-top: 10px; }
    .insight-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }
    .insight-row:last-child { border-bottom: 0; }
    .insight-row .label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }
    .insight-row .value { font-size: 15px; font-weight: 700; text-align: right; }
    .tone-good { color: var(--good); }
    .tone-bad { color: var(--bad); }
    .tone-warn { color: var(--warn); }

    section { padding: 88px 0; }
    .section-head {
      max-width: 780px;
      margin: 0 auto 46px;
      text-align: center;
    }
    .section-head h2 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.045em;
    }
    .section-head p {
      margin: 18px 0 0;
      font-size: 19px;
      line-height: 1.75;
      color: var(--muted);
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .card {
      background: rgba(255,255,255,0.9);
      border: 1px solid #dfe8f1;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.07);
      backdrop-filter: blur(10px);
      height: 100%;
    }
    .icon-box {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #eff6ff;
      border: 1px solid #cfe9fb;
      color: #0369a1;
      font-size: 20px;
      box-shadow: 0 8px 20px rgba(14,165,233,0.08);
      margin-bottom: 18px;
    }
    .card h3 { margin: 0; font-size: 24px; letter-spacing: -0.03em; }
    .card p { margin: 12px 0 0; color: var(--muted); line-height: 1.8; font-size: 15px; }

    .split-grid {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 20px;
      align-items: start;
    }

    .soft-panel {
      border-radius: 34px;
      border: 1px solid #dfe8f1;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      padding: 34px;
      box-shadow: var(--shadow);
    }
    .soft-panel h2, .content-panel h2, .cta-panel h2 { margin: 0; font-size: clamp(34px, 4vw, 48px); line-height: 1.04; letter-spacing: -0.045em; }
    .soft-panel p, .content-panel p, .cta-panel p { margin: 18px 0 0; color: var(--muted); font-size: 18px; line-height: 1.8; }

    .check-list { margin-top: 28px; display: grid; gap: 14px; }
    .check-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 20px;
      background: white;
      border: 1px solid var(--line);
    }
    .check-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--good-bg);
      border: 1px solid #bbf7d0;
      color: var(--good);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .mini-card {
      border-radius: 30px;
      border: 1px solid var(--line);
      background: white;
      padding: 26px;
      box-shadow: 0 18px 55px rgba(15,23,42,0.06);
    }
    .mini-card .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .mini-card .title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }
    .mini-card .big-score { margin-top: 18px; border-radius: 24px; padding: 22px; border: 1px solid #bbf7d0; background: rgba(236,253,245,0.8); }
    .mini-card .big-score .tag {
      display: inline-flex; padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 700;
      border: 1px solid #bbf7d0; background: white; color: var(--good);
    }
    .mini-card .big-score .number { margin-top: 14px; font-size: 42px; line-height: 1; font-weight: 700; letter-spacing: -0.05em; color: var(--good); }
    .mini-card .big-score p { margin: 12px 0 0; font-size: 14px; color: var(--muted); line-height: 1.8; }

    .confidence-list { margin-top: 18px; display: grid; gap: 10px; }
    .confidence-row {
      display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 16px; border-radius: 18px; border: 1px solid var(--line);
      font-size: 14px;
    }
    .high { background: #f0f9ff; border-color: #bae6fd; }
    .medium { background: #fff7ed; border-color: #fed7aa; }
    .low { background: #fff1f2; border-color: #fecdd3; }

    .triple-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 18px; }
    .triple-box {
      border-radius: 24px; padding: 20px; border: 1px solid var(--line); background: rgba(248,250,252,0.8);
    }
    .triple-box.sky { border-color: #bae6fd; background: #f0f9ff; }
    .triple-box.good { border-color: #bbf7d0; background: #ecfdf5; }
    .triple-box .label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted-2); }
    .triple-box.good .label { color: var(--good); }
    .triple-box .value { margin-top: 10px; font-size: 30px; font-weight: 700; letter-spacing: -0.04em; }
    .triple-box.good .value { color: var(--good); }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }
    .step-card {
      border-radius: 30px;
      border: 1px solid var(--line);
      background: white;
      padding: 26px;
      box-shadow: 0 18px 50px rgba(15,23,42,0.06);
      height: 100%;
    }
    .step-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
